<nav
  class="sticky top-0 z-50 w-full bg-white transition-all duration-300"
  [class.backdrop-blur-sm]="isScrolling()"
  [class.border-b]="isScrolling()"
  [class.border-slate-200]="isScrolling()"
>
  <div class="flex items-center justify-between px-4 py-4 md:px-8 md:py-5">
    <!-- Left: Brand Logo -->
    <div class="flex-shrink-0">
      <a
        routerLink="/"
        class="text-xl font-bold text-slate-700 transition-colors duration-200 hover:text-rose-500"
      >
        Cebu Flowers
      </a>
    </div>

    <!-- Center: Desktop Navigation Links -->
    <div class="hidden md:flex items-center gap-8">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="text-rose-500"
          [routerLinkActiveOptions]="{ exact: false }"
          class="text-slate-700 font-medium transition-all duration-300 relative group"
        >
          {{ link.label }}
          <!-- Pink underline on hover -->
          <span
            class="absolute bottom-0 left-0 w-0 h-0.5 bg-gradient-to-r from-rose-400 to-pink-500 transition-all duration-300 group-hover:w-full"
          ></span>
        </a>
      }
    </div>

    <!-- Right: Actions (Desktop) -->
    <div class="hidden md:flex items-center gap-6">
      <!-- Cart Icon with Badge -->
      <button
        class="relative text-slate-700 hover:text-rose-500 transition-colors duration-200"
        aria-label="Shopping cart"
      >
        <!-- Cart Icon (using SVG inline) -->
        <svg
          class="w-6 h-6"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
          ></path>
        </svg>

        <!-- Pink Notification Badge -->
        @if (cartItemCount() > 0) {
          <span
            class="absolute -top-2 -right-2 bg-rose-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"
          >
            {{ cartItemCount() }}
          </span>
        }
      </button>

    @if (isLoggedIn()) {
      <!-- Login Button -->
      <button
        class="px-6 py-2 bg-rose-500 text-white font-medium rounded-lg transition-all duration-300 hover:bg-rose-600 hover:shadow-md active:scale-95"
        aria-label="Login"
      >
        Login
      </button>
    }@else{
        <!-- Logout Button -->
        <button
          class="px-6 py-2 bg-slate-700 text-white font-medium rounded-lg transition-all duration-300 hover:bg-slate-800 hover:shadow-md active:scale-95"
          aria-label="Logout"
        >
          Logout
        </button>
    }
    </div>


    <!-- Mobile Menu Toggle Button -->
    <button
      class="md:hidden p-2 text-slate-700 hover:text-rose-500 transition-colors duration-200"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
      aria-label="Toggle navigation menu"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        @if (!isMenuOpen()) {
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        } @else {
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          ></path>
        }
      </svg>
    </button>
  </div>

  <!-- Mobile Menu Dropdown -->
  @if (isMenuOpen()) {
    <div
      class="md:hidden border-t border-slate-200 bg-white transition-all duration-300 ease-out overflow-hidden"
    >
      <div class="px-4 py-4 space-y-3">
        <!-- Mobile Navigation Links -->
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            (click)="onNavLinkClick()"
            routerLinkActive="text-rose-500 font-semibold"
            [routerLinkActiveOptions]="{ exact: false }"
            class="block text-slate-700 font-medium transition-colors duration-200 py-2 hover:text-rose-500"
          >
            {{ link.label }}
          </a>
        }

        <!-- Mobile Cart & Login Section -->
        <div class="pt-4 border-t border-slate-200 space-y-3">
          <button
            class="w-full flex items-center justify-center gap-2 py-2 text-slate-700 hover:text-rose-500 transition-colors duration-200"
            aria-label="Shopping cart"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"
              ></path>
            </svg>
            Cart
            @if (cartItemCount() > 0) {
              <span
                class="bg-rose-500 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center"
              >
                {{ cartItemCount() }}
              </span>
            }
          </button>

          <button
            class="w-full px-6 py-2 bg-rose-500 text-white font-medium rounded-lg transition-all duration-300 hover:bg-rose-600 active:scale-95"
            aria-label="Login"
          >
            Login
          </button>
        </div>
      </div>
    </div>
  }
</nav>
